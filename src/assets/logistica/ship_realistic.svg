<svg viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hullGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="90%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="superstructureGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="waterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0.8"/>
    </linearGradient>
  </defs>

  <!-- Superstructure (Bridge/Cabin) at the back (right side) -->
  <g id="superstructure">
    <!-- Main block -->
    <path d="M 680 140 L 680 50 L 730 50 L 740 140 Z" fill="url(#superstructureGrad)" stroke="#cbd5e1" stroke-width="2"/>
    <!-- Funnel (Chimney) -->
    <path d="M 700 50 L 705 20 L 725 20 L 720 50 Z" fill="#b91c1c" stroke="#991b1b" stroke-width="2"/>
    <rect x="704" y="20" width="22" height="6" fill="#1e293b"/>
    <!-- Windows -->
    <rect x="685" y="60" width="8" height="6" fill="#0284c7" opacity="0.8"/>
    <rect x="696" y="60" width="8" height="6" fill="#0284c7" opacity="0.8"/>
    <rect x="707" y="60" width="8" height="6" fill="#0284c7" opacity="0.8"/>
    <rect x="718" y="60" width="8" height="6" fill="#0284c7" opacity="0.8"/>
    
    <rect x="688" y="75" width="6" height="6" fill="#0284c7" opacity="0.8"/>
    <rect x="698" y="75" width="6" height="6" fill="#0284c7" opacity="0.8"/>
    <rect x="708" y="75" width="6" height="6" fill="#0284c7" opacity="0.8"/>
    <rect x="718" y="75" width="6" height="6" fill="#0284c7" opacity="0.8"/>
    <!-- Radar / Antennas -->
    <line x1="710" y1="50" x2="710" y2="35" stroke="#64748b" stroke-width="2"/>
    <line x1="700" y1="35" x2="720" y2="35" stroke="#64748b" stroke-width="1.5"/>
  </g>

  <!-- Main Hull -->
  <path d="M 30 140 
           L 780 140 
           C 785 140, 788 145, 785 150
           L 750 190 
           C 730 200, 710 200, 680 200 
           L 120 200 
           C 90 200, 60 195, 40 170 
           L 20 145
           C 18 142, 20 140, 30 140 Z" 
        fill="url(#hullGrad)" stroke="#334155" stroke-width="2"/>
  
  <!-- Red Bottom (below waterline) -->
  <path d="M 40 170 
           C 60 195, 90 200, 120 200 
           L 680 200 
           C 710 200, 730 200, 750 190
           L 735 170 Z" 
        fill="#991b1b"/>

  <!-- Plating details / White Stripe -->
  <line x1="30" y1="145" x2="780" y2="145" stroke="#f8fafc" stroke-width="3"/>
  <line x1="28" y1="155" x2="770" y2="155" stroke="#475569" stroke-width="1" stroke-dasharray="10 20"/>
  
  <!-- Bulbous Bow hint -->
  <ellipse cx="40" cy="180" rx="8" ry="12" fill="#991b1b" transform="rotate(-30 40 180)"/>

  <!-- Anchor detail -->
  <circle cx="70" cy="155" r="4" fill="#cbd5e1"/>
  <path d="M 70 155 L 70 165 M 65 162 C 65 170, 75 170, 75 162" stroke="#cbd5e1" stroke-width="1.5" fill="none"/>

  <!-- Water reflection -->
  <path d="M 0 195 L 800 195 L 800 200 L 0 200 Z" fill="url(#waterGrad)"/>
</svg>
